{% extends "base.html" %}
{% block title %}Atlas — Authenticate{% endblock %}
{% block body %}
<div class="min-h-full flex items-center justify-center px-4">
    <div class="w-full max-w-md fade-in">
        <!-- Logo / Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-atlas-700/20 border border-atlas-600/30 mb-4 glow">
                <svg class="w-10 h-10 text-atlas-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Atlas Orchestration Hub</h1>
            <p class="text-gray-400 mt-2 text-sm">AI Drone Fleet Command Center</p>
        </div>

        <!-- Login Card -->
        <div class="bg-surface-800 rounded-2xl border border-gray-700/50 p-8 glow">
            <form method="POST" action="/auth/login" class="space-y-6" data-testid="login-form">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Access Code</label>
                    <input type="password" name="password" id="password" required autofocus
                        data-testid="login-password-input"
                        class="w-full px-4 py-3 bg-surface-950 border border-gray-600/50 rounded-xl text-white placeholder-gray-500 focus:ring-2 focus:ring-atlas-500 focus:border-transparent outline-none transition"
                        placeholder="Enter command password">
                </div>
                {% if error %}
                <div data-testid="login-error-message" class="flex items-center gap-2 text-red-400 text-sm bg-red-500/10 border border-red-500/20 rounded-lg px-4 py-3">
                    <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                    <span>{{ error }}</span>
                </div>
                {% endif %}
                <button type="submit" data-testid="login-submit-button"
                    class="w-full py-3 px-4 bg-atlas-600 hover:bg-atlas-500 text-white font-semibold rounded-xl transition duration-200 focus:ring-2 focus:ring-atlas-400 focus:ring-offset-2 focus:ring-offset-surface-800">
                    Authenticate
                </button>
            </form>
        </div>

        <p class="text-center text-gray-400 text-xs mt-6" data-testid="login-footer-copy">Secured by Atlas Security Protocol v2.0</p>
    </div>
</div>
{% endblock %}
