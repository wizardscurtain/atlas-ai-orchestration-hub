{% extends "base.html" %}
{% block title %}Atlas — Secrets Warchest{% endblock %}
{% block body %}
<div class="min-h-full">
    <nav class="bg-surface-800/80 backdrop-blur border-b border-gray-700/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <a href="/dashboard" class="text-gray-400 hover:text-white transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
                    </a>
                    <span class="text-lg font-semibold text-white">Universal Secrets Warchest</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-surface-800 rounded-xl border border-gray-700/50 p-6 mb-8">
            <h2 class="text-xl font-bold text-white mb-4">Add Secret</h2>
            <form action="/api/warchest/add" method="POST" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" name="key" placeholder="SECRET_KEY" class="bg-surface-950 border border-gray-600 rounded-lg p-2 text-white" required>
                <input type="password" name="value" placeholder="value" class="bg-surface-950 border border-gray-600 rounded-lg p-2 text-white" required>
                <button type="submit" class="bg-atlas-600 hover:bg-atlas-500 text-white rounded-lg p-2 font-bold transition">Store Secret</button>
            </form>
        </div>

        <div class="space-y-4">
            <h2 class="text-xl font-bold text-white">Stored Secrets</h2>
            <div class="grid grid-cols-1 gap-4">
                {% for s in secrets %}
                <div class="bg-surface-800 border border-gray-700/50 rounded-xl p-4 flex justify-between items-center">
                    <div>
                        <p class="font-mono text-atlas-400 font-bold">{{ s.key }}</p>
                        <p class="text-xs text-gray-500">Added on {{ s.created_at[:10] }}</p>
                    </div>
                    <div class="text-right">
                        <span class="bg-gray-900 text-gray-400 px-3 py-1 rounded-lg text-xs font-mono">••••••••</span>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </main>
</div>
{% endblock %}
